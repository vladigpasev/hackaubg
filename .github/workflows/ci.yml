name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hackaubg
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hackaubg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      VITE_API_URL: http://localhost:3000/api/v1
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hackaubg
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: github-actions-secret
      CORS_ORIGIN: http://localhost:5173
      HOSPITAL_API_BASE_URL: https://hospital-system.example.com

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma generate

      - name: Apply Prisma migrations
        run: pnpm --filter backend prisma migrate deploy

      - name: Seed database
        run: pnpm --filter backend prisma db seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
